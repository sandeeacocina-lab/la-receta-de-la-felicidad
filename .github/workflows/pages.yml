name: Publicar sitio en GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Reconstruir y verificar el sitio
        shell: bash
        run: |
          mkdir -p _site
          cat .site-parts/site.zip.part-* > /tmp/site.zip
          unzip -tq /tmp/site.zip
          python - <<'PY'
          import pathlib
          import shutil
          import zipfile

          destination = pathlib.Path("_site")
          with zipfile.ZipFile("/tmp/site.zip") as archive:
              for item in archive.infolist():
                  name = item.filename.replace("\\", "/")
                  if not name:
                      continue
                  relative = pathlib.PurePosixPath(name)
                  if relative.is_absolute() or ".." in relative.parts:
                      raise ValueError(f"Ruta no válida: {name}")
                  target = destination.joinpath(*relative.parts)
                  if name.endswith("/"):
                      target.mkdir(parents=True, exist_ok=True)
                  else:
                      target.parent.mkdir(parents=True, exist_ok=True)
                      with archive.open(item) as source, target.open("wb") as output:
                          shutil.copyfileobj(source, output)
          PY
          test -f _site/index.html

      - name: Personalizar la portada
        shell: bash
        run: |
          cp analytics.js _site/analytics.js
          cp index-home.html _site/index.html
          python3 generate-missing-recipe-pages.py _site
          mkdir -p _site/wp-content/uploads/2026/07
          base64 --decode site-overrides/mis-otras-webs-happy-cupcakes.webp.b64 > _site/wp-content/uploads/2026/07/mis-otras-webs-happy-cupcakes.webp
          base64 --decode site-overrides/mis-otras-webs-polos-helados.webp.b64 > _site/wp-content/uploads/2026/07/mis-otras-webs-polos-helados.webp
          base64 --decode site-overrides/mis-otras-webs-con-la-comida.webp.b64 > _site/wp-content/uploads/2026/07/mis-otras-webs-con-la-comida.webp
          base64 --decode site-overrides/mis-otras-webs-sandra-mangas.webp.b64 > _site/wp-content/uploads/2026/07/mis-otras-webs-sandra-mangas.webp

      - name: Aplicar privacidad y medición
        shell: bash
        run: |
          base64 --decode site-overrides/cookie-compliance-overlay.zip.b64 > /tmp/cookie-compliance-overlay.zip
          unzip -oq /tmp/cookie-compliance-overlay.zip -d _site
          test -f _site/politica-de-cookies/index.html
          test -f _site/analytics.js

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar archivos para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
