name: Publicar sitio en GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Reconstruir y verificar el sitio
        shell: bash
        run: |
          mkdir -p _site
          cat .site-parts/site.zip.part-* > /tmp/site.zip
          unzip -tq /tmp/site.zip
          python - <<'PY'
          import pathlib
          import shutil
          import zipfile

          destination = pathlib.Path("_site")
          with zipfile.ZipFile("/tmp/site.zip") as archive:
              for item in archive.infolist():
                  name = item.filename.replace("\\", "/")
                  if not name:
                      continue
                  relative = pathlib.PurePosixPath(name)
                  if relative.is_absolute() or ".." in relative.parts:
                      raise ValueError(f"Ruta no válida: {name}")
                  target = destination.joinpath(*relative.parts)
                  if name.endswith("/"):
                      target.mkdir(parents=True, exist_ok=True)
                  else:
                      target.parent.mkdir(parents=True, exist_ok=True)
                      with archive.open(item) as source, target.open("wb") as output:
                          shutil.copyfileobj(source, output)
          PY
          test -f _site/index.html

      - name: Activar Analytics solo en la portada
        shell: bash
        run: |
          cp analytics.js _site/analytics.js
          python - <<'PY'
          from pathlib import Path

          page = Path("_site/index.html")
          html = page.read_text(encoding="utf-8")
          script = '  <script defer src="/analytics.js"></script>\n'
          if script.strip() not in html:
              if "</head>" not in html:
                  raise ValueError("No se encontró </head> en la portada")
              html = html.replace("</head>", script + "</head>", 1)
              page.write_text(html, encoding="utf-8")
          PY

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar archivos para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
